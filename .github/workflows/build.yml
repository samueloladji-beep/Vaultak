name: Build Vaultak Sentry

on:
  push:
    branches: [main]
    paths:
      - 'sentry-app/**'
  workflow_dispatch:

jobs:
  build-macos-arm:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd sentry-app
          pip install pyinstaller requests
          brew install python-tk@3.11 || true

      - name: Build
        run: |
          cd sentry-app
          python -m PyInstaller \
            --name "Vaultak Sentry" \
            --windowed \
            --onedir \
            --noconfirm \
            --icon "assets/icon.icns" \
            --add-data "assets:assets" \
            --hidden-import "tkinter" \
            --hidden-import "requests" \
            --osx-bundle-identifier "com.vaultak.sentry" \
            vaultak_sentry_app.py

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign the app
        run: |
          APP="sentry-app/dist/Vaultak Sentry.app"
          SIGN_ID="Developer ID Application: Samuel Oladji (R5UQZVTD4S)"
          ENTITLEMENTS="sentry-app/entitlements.plist"
          # Sign all .so and .dylib files
          find "$APP" -type f -name "*.so" | while read f; do
            codesign --force --sign "$SIGN_ID" --options runtime --entitlements "$ENTITLEMENTS" "$f" 2>/dev/null || true
          done
          find "$APP" -type f -name "*.dylib" | while read f; do
            codesign --force --sign "$SIGN_ID" --options runtime --entitlements "$ENTITLEMENTS" "$f" 2>/dev/null || true
          done
          # Sign Python binaries explicitly
          find "$APP" -type f -name "Python" | while read f; do
            codesign --force --sign "$SIGN_ID" --options runtime --entitlements "$ENTITLEMENTS" "$f" 2>/dev/null || true
          done
          # Sign Python framework versions
          find "$APP" -path "*/Python.framework/Versions/*/Python" -type f | while read f; do
            codesign --force --sign "$SIGN_ID" --options runtime --entitlements "$ENTITLEMENTS" "$f" 2>/dev/null || true
          done
          # Sign all executables
          find "$APP" -type f -perm +111 | while read f; do
            codesign --force --sign "$SIGN_ID" --options runtime --entitlements "$ENTITLEMENTS" "$f" 2>/dev/null || true
          done
          # Sign frameworks
          find "$APP" -name "*.framework" -type d | sort -r | while read f; do
            codesign --force --sign "$SIGN_ID" --options runtime --entitlements "$ENTITLEMENTS" "$f" 2>/dev/null || true
          done
          # Finally sign the app bundle
          codesign --force --verify --verbose \
            --sign "$SIGN_ID" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP"
          # Verify
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Package .pkg
        run: |
          cd sentry-app
          mkdir -p pkg_root/Applications
          cp -r "dist/Vaultak Sentry.app" "pkg_root/Applications/"
          pkgbuild \
            --root pkg_root \
            --identifier com.vaultak.sentry \
            --version 1.0.3 \
            --install-location / \
            "dist/VaultakSentry-1.0.3-arm64.pkg"
          rm -rf pkg_root

      - name: Notarize .pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMISSION=$(xcrun notarytool submit sentry-app/dist/VaultakSentry-1.0.3-arm64.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --output-format json)
          echo "$SUBMISSION"
          SUBMISSION_ID=$(echo "$SUBMISSION" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          echo "Submission ID: $SUBMISSION_ID"
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true
          STATUS=$(echo "$SUBMISSION" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            exit 1
          fi
          xcrun stapler staple sentry-app/dist/VaultakSentry-1.0.3-arm64.pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultakSentry-macOS-arm64
          path: sentry-app/dist/VaultakSentry-1.0.3-arm64.pkg


  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: sentry-app
        run: pip install pyinstaller requests

      - name: Build
        working-directory: sentry-app
        run: |
          python -m PyInstaller --name "Vaultak Sentry" --windowed --onedir --noconfirm --icon "assets/icon.ico" --add-data "assets;assets" --hidden-import "tkinter" --hidden-import "requests" vaultak_sentry_app.py

      - name: Zip output
        working-directory: sentry-app/dist
        run: Compress-Archive -Path "Vaultak Sentry" -DestinationPath "VaultakSentry-1.0.3-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultakSentry-windows
          path: sentry-app/dist/VaultakSentry-1.0.3-windows.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          cd sentry-app
          pip install pyinstaller requests

      - name: Build
        run: |
          cd sentry-app
          python -m PyInstaller \
            --name "Vaultak Sentry" \
            --windowed \
            --onedir \
            --noconfirm \
            --add-data "assets:assets" \
            --hidden-import "tkinter" \
            --hidden-import "requests" \
            vaultak_sentry_app.py

      - name: Tar output
        run: |
          cd sentry-app/dist
          tar -czf VaultakSentry-1.0.3-linux.tar.gz "Vaultak Sentry"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultakSentry-linux
          path: sentry-app/dist/VaultakSentry-1.0.3-linux.tar.gz

  release:
    name: Create Release
    needs: [build-macos-arm, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.3
          name: Vaultak Sentry v1.0.3
          draft: false
          prerelease: false
          files: |
            artifacts/VaultakSentry-macOS-arm64/*.pkg
            artifacts/VaultakSentry-windows/*.zip
            artifacts/VaultakSentry-linux/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
